spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/auth/**

        - id: notification-service
          uri: http://notification-service:8082
          predicates:
            - Path=/api/notifications/**

        - id: event-service
          uri: http://event-service:8083
          predicates:
            - Path=/api/events/**

        - id: booking-service
          uri: http://booking-service:8084
          predicates:
            - Path=/api/bookings/**
