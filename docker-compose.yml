version: '3.8'
services:

  postgres-user:
    image: postgres:17
    container_name: postgres-user
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5433:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d users_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - postgres_user_data:/var/lib/postgresql/data
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka-kraft
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT'

      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093'

      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092,INTERNAL://kafka:29092'

      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  mongo-notification:
    image: mongo:8
    container_name: mongo-notification

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_DATABASE: notifications_db
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

    healthcheck:
      test:
        [ "CMD","mongosh","-u","${MONGO_USER}","-p","${MONGO_PASSWORD}","--authenticationDatabase","admin","--eval","db.adminCommand('ping')" ]
      interval: 10s
      timeout: 10s
      retries: 5

    volumes:
      - mongo_notification_data:/data/db

  postgres-events:
    image: postgres:17
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d events_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-bookings:
    image: postgres:17
    environment:
      POSTGRES_DB: bookings_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5436:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d bookings_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - redis_data:/data

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      user-service:
        condition: service_healthy

      booking-service:
        condition: service_healthy

      event-service:
        condition: service_healthy

      notification-service:
        condition: service_healthy

  user-service:
    build:
      context: ./user-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      USER_DB_URL: ${USER_DB_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
    container_name: user-service

    ports:
      - "8081:8081"
    depends_on:
      postgres-user:
        condition: service_healthy

      kafka:
        condition: service_started

      redis:
        condition: service_healthy

    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8081/actuator/health || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  notification-service:
    build:
      context: ./notification-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      MONGO_URI: ${MONGO_URI}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      mongo-notification:
        condition: service_healthy

      kafka:
        condition: service_started


    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8082/actuator/health || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  event-service:
    build:
      context: ./event-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      EVENT_DB_URL: ${EVENT_DB_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    container_name: event-service
    ports:
      - "8083:8083"

    depends_on:
      postgres-events:
        condition: service_healthy
      kafka:
        condition: service_started

    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8083/actuator/health || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  booking-service:
    build:
      context: ./booking-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      BOOKING_DB_URL: ${BOOKING_DB_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      postgres-bookings:
        condition: service_healthy
      kafka:
        condition: service_started

    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8084/actuator/health || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  mongo_notification_data:
  kafka_data:
    driver: local
  postgres_user_data:
  redis_data: